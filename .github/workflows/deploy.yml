name: CI/CD VM Auto-Update

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest

    steps:
      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script: |
            echo "🚀 Début du déploiement de la plateforme..."
            cd ~/pfe-nsia-bancassurance/security-pfe
            git pull origin main
            
            echo "📦 Mise à jour des dépendances du backend..."
            cd bancassurance
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "🔄 Application des migrations de base de données (incluant RLS)..."
            DJANGO_ENV=production python manage.py migrate --noinput
            
            echo "⚡ Redémarrage du serveur backend..."
            sudo systemctl restart bancassurance || sudo systemctl restart gunicorn || echo "⚠️ Service systemd non redémarré (redémarrage manuel requis)"
            
            echo "📦 Construction de l'image Docker du frontend Next.js..."
            cd ~/pfe-nsia-bancassurance/security-pfe/NSIA_Banque
            sudo docker build \
              --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              --build-arg NEXT_PUBLIC_KEYCLOAK_CLIENT_ID="${{ secrets.NEXT_PUBLIC_KEYCLOAK_CLIENT_ID }}" \
              --build-arg KEYCLOAK_ISSUER="${{ secrets.KEYCLOAK_ISSUER }}" \
              -t nsia-frontend:latest .

            echo "⚡ Lancement du conteneur Docker frontend..."
            sudo docker stop nsia-frontend || true
            sudo docker rm nsia-frontend || true
            sudo docker run -d \
              --name nsia-frontend \
              -p 3000:3000 \
              --restart always \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              -e KEYCLOAK_CLIENT_SECRET="${{ secrets.KEYCLOAK_CLIENT_SECRET }}" \
              -e KEYCLOAK_ISSUER="${{ secrets.KEYCLOAK_ISSUER }}" \
              -e NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              nsia-frontend:latest

            echo "✅ Déploiement du backend et du frontend terminé avec succès !"
