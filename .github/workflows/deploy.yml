name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ==========================================
  # 1. SECRET SCANNING (Gitleaks)
  # ==========================================
  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour que Gitleaks scanne tout l'historique des commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 2. SAST (Static Application Security Testing - Semgrep)
  # ==========================================
  sast-scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep

      - name: Run Semgrep scan
        run: |
          semgrep scan --config auto --error --severity ERROR

  # ==========================================
  # 3. SCA (Software Composition Analysis - Trivy FS)
  # ==========================================
  sca-scan:
    name: SCA (Trivy Dependencies)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          exit-code: '1' # Bloque le pipeline en cas de vulnérabilité HIGH ou CRITICAL
          ignore-unfixed: true # Ignore les vulnérabilités sans correctif disponible

  # ==========================================
  # 4. IaC SCANNING (Infrastructure as Code - Checkov)
  # ==========================================
  iac-scan:
    name: IaC Scanning (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install checkov

      - name: Run Checkov scan
        run: |
          checkov -d . --framework all --config-file .checkov.yaml --hard-fail-on HIGH,CRITICAL

  # ==========================================
  # 5. CONTAINER SCANNING (Trivy Image Scan)
  # ==========================================
  build-and-scan-image:
    name: Container Build & Scan
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast-scan, sca-scan, iac-scan] # Dépend de la réussite de toutes les analyses statiques
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Next.js Image
        uses: docker/build-push-action@v5
        with:
          context: ./NSIA_Banque
          file: ./NSIA_Banque/Dockerfile
          push: false # Construit l'image uniquement dans le runner pour analyse
          tags: nsia-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=client-id-scan
            KEYCLOAK_ISSUER=http://localhost:8080/realms/nsia

      - name: Scan Next.js Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nsia-frontend:latest'
          scan-type: 'image'
          severity: 'HIGH,CRITICAL'
          exit-code: '1' # Bloque le pipeline en cas de vulnérabilité d'image HIGH ou CRITICAL
          ignore-unfixed: true

  # ==========================================
  # 6. DEPLOYMENT (VM SSH)
  # ==========================================
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [build-and-scan-image] # Le déploiement s'exécute uniquement si l'image est valide et sécurisée
    steps:
      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script: |
            echo "🚀 Début du déploiement de la plateforme..."
            cd ~/pfe-nsia-bancassurance/security-pfe
            git pull origin main
            
            echo "📦 Mise à jour des dépendances du backend..."
            cd bancassurance
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "🔄 Application des migrations de base de données (incluant RLS)..."
            DJANGO_ENV=production python manage.py migrate --noinput
            
            echo "⚡ Redémarrage du serveur backend..."
            sudo systemctl restart bancassurance || sudo systemctl restart gunicorn || echo "⚠️ Service systemd non redémarré (redémarrage manuel requis)"
            
            echo "📦 Construction de l'image Docker du frontend Next.js..."
            cd ~/pfe-nsia-bancassurance/security-pfe/NSIA_Banque
            sudo docker build \
              --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              --build-arg NEXT_PUBLIC_KEYCLOAK_CLIENT_ID="${{ secrets.NEXT_PUBLIC_KEYCLOAK_CLIENT_ID }}" \
              --build-arg KEYCLOAK_ISSUER="${{ secrets.KEYCLOAK_ISSUER }}" \
              -t nsia-frontend:latest .

            echo "⚡ Lancement du conteneur Docker frontend..."
            sudo docker stop nsia-frontend || true
            sudo docker rm nsia-frontend || true
            sudo docker run -d \
              --name nsia-frontend \
              -p 3000:3000 \
              --restart always \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              -e KEYCLOAK_CLIENT_SECRET="${{ secrets.KEYCLOAK_CLIENT_SECRET }}" \
              -e KEYCLOAK_ISSUER="${{ secrets.KEYCLOAK_ISSUER }}" \
              -e NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              nsia-frontend:latest

            echo "✅ Déploiement du backend et du frontend terminé avec succès !"

  # ==========================================
  # 7. DAST (Dynamic Application Security Testing - OWASP ZAP)
  # ==========================================
  dast-scan:
    name: DAST (OWASP ZAP Scan)
    runs-on: ubuntu-latest
    needs: [deploy] # Exécuté uniquement après le déploiement sur la cible active
    steps:
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://4.223.87.112'
          fail_action: 'true' # Bloque le job en cas d'alertes graves
