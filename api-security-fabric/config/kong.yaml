_format_version: "3.0"
services:
  - name: nsia-backend-service
    url: http://nsia-api-metier:8000
    routes:
      - name: api-v1-banques-get
        paths:
          - /api/v1/banques/
        methods:
          - GET
        plugins:
          - name: key-auth
            config:
                key_names:
                  - apikey
            
          - name: acl
