# ============================================================
# NetworkPolicy — nsia-iam (Identity Plane)
# Keycloak accessible uniquement via Kong (proxy) et Backend
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-iam-traffic
  namespace: nsia-iam
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Keycloak ← Kong (proxy public) et Backend (validation tokens)
    - from:
        - namespaceSelector:
            matchLabels:
              nsia.cg/purpose: ingress
        - namespaceSelector:
            matchLabels:
              nsia.cg/purpose: api
      ports:
        - port: 8080
    # IAM-DB ← Keycloak uniquement (intra-namespace)
    - from:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 5432
  egress:
    # Keycloak → sa propre BDD (intra-namespace)
    - to:
        - podSelector:
            matchLabels:
              app: iam-db
      ports:
        - port: 5432
    # Keycloak → SMTP externe (envoi d'e-mails d'onboarding)
    - to: []
      ports:
        - port: 587
        - port: 465
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
