# ============================================================
# HashiCorp Vault — Service
# ClusterIP uniquement (pas d'exposition publique)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: nsia-security
  labels:
    app: vault
spec:
  type: ClusterIP
  ports:
    - port: 8200
      targetPort: 8200
      name: api
  selector:
    app: vault
