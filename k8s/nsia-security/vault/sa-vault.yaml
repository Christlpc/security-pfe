# ============================================================
# HashiCorp Vault — ServiceAccount + RBAC
# Permet à Vault de valider les tokens K8s (auth method kubernetes)
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: nsia-security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-token-review
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: nsia-security
