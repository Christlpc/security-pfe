apiVersion: v1
kind: Service
metadata:
  name: postfix-mail-service
  namespace: nsia-security
  labels:
    app: postfix-mail-service
spec:
  type: NodePort
  ports:
    - port: 25
      targetPort: 1025
      protocol: TCP
      name: smtp
    - port: 8025
      targetPort: 8025
      nodePort: 30625
      protocol: TCP
      name: http
  selector:
    app: postfix-mail-service
