# ============================================================
# Keycloak — Service ClusterIP
# JAMAIS de NodePort. Accès via Kong Gateway uniquement.
# Empêche le contournement de l'API Gateway par un attaquant.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: nsia-iam
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: keycloak
