# ============================================================
# Keycloak — Secret
# Identifiants PostgreSQL IAM + Keycloak Admin
# NOTE: En production, généré par le playbook Ansible via
#       templates/secret-keycloak.yaml.j2
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: nsia-iam
type: Opaque
stringData:
  POSTGRES_DB: "keycloak"
  POSTGRES_USER: "keycloak"
  POSTGRES_PASSWORD: "CHANGE_ME_VAULT_SECRET"
  KEYCLOAK_ADMIN: "super_admin"
  KEYCLOAK_ADMIN_PASSWORD: "CHANGE_ME_VAULT_SECRET"
