apiVersion: v1
kind: Namespace
metadata:
  name: nsia-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nsia-frontend
  labels:
    app: frontend
    nsia.cg/component: web-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        nsia.cg/component: web-ui
    spec:
      containers:
        - name: nextjs
          image: nsia-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXTAUTH_SECRET
              value: "a-very-long-and-secure-random-secret-for-nextauth-sign-keys"
            - name: NEXTAUTH_URL
              value: "https://4.223.87.112:30843"
            - name: KEYCLOAK_ISSUER
              value: "https://4.223.87.112:30843/realms/BANK_ECOBANK"
            - name: KEYCLOAK_CLIENT_SECRET
              value: ""
            - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
              value: "nsia-bancassurance-frontend"
            - name: NEXT_PUBLIC_API_URL
              value: "https://4.223.87.112:30843"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: nsia-frontend
  labels:
    app: frontend
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: frontend
