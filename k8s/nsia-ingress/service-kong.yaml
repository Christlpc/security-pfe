# ============================================================
# Kong Gateway — Services (NodePort + ClusterIP)
# SEUL service exposé sur Internet via Azure NSG
# Le trafic entre par ModSecurity (WAF) (:80/443)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: nsia-ingress
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80               # → ModSecurity (WAF)
      nodePort: 30800
      name: http
    - port: 443
      targetPort: 443              # → ModSecurity (WAF) + TLS
      nodePort: 30843
      name: https
  selector:
    app: kong
---
# Admin API — JAMAIS exposé publiquement
apiVersion: v1
kind: Service
metadata:
  name: kong-admin
  namespace: nsia-ingress
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: admin
  selector:
    app: kong
