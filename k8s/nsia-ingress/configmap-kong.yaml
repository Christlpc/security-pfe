              - name: rate-limiting
                config:
                  minute: 5
                  policy: local
              - name: acl
                config:
                  allow:
                    - partners
              - name: request-size-limiting
                config:
                  allowed_payload_size: 1

          - name: api-v1-simulations-questionnaires-medicaux-bareme
            paths:
              - /api/v1/simulations/questionnaires-medicaux/bareme/
            methods:
