              - name: acl
                config:
                  allow:
                    - partners
              - name: request-size-limiting
                config:
                  allowed_payload_size: 1

          - name: api-v1-simulations-historique-id-valider
            paths:
              - ~/api/v1/simulations/historique/(?<id>[^/]+)/valider/
            methods:
              - POST
            strip_path: false
            plugins:
              - name: jwt
                config:
                  claims_to_verify:
                    - exp
              - name: rate-limiting
                config:
                  minute: 5
                  policy: local
              - name: acl
                config:
                  allow:
                    - partners
              - name: request-size-limiting
