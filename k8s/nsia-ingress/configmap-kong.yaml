# ============================================================
# Kong Gateway — Configuration Déclarative (DB-less)
# Routes API avec profils de sécurité (key-auth/JWT/ACL)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
  namespace: nsia-ingress
data:
  kong.yaml: |
    _format_version: "3.0"
    services:
      # ===== SERVICE FRONTEND (Web UI Next.js) =====
      - name: nsia-frontend-service
        url: http://frontend-service.nsia-frontend.svc.cluster.local:3000
        routes:
          - name: frontend-route
            paths:
              - /
            strip_path: false

      # ===== SERVICE BACKEND (API Métier NSIA) =====
      - name: nsia-backend-service
        url: http://backend.nsia-backend.svc.cluster.local:8000
        routes:
          - name: api-v1-backend-routes
            paths:
              - /api/v1/
            strip_path: false

      # ===== SERVICE KEYCLOAK (Proxy IAM via Kong) =====
      - name: keycloak-service
        url: http://keycloak.nsia-iam.svc.cluster.local:8080
        routes:
          - name: keycloak-realms
            paths:
              - /realms
              - /admin
              - /resources
              - /js
            strip_path: false

      # ===== HEALTH CHECK ENDPOINT =====
      - name: health-service
        url: http://127.0.0.1:8001
        routes:
          - name: health
            paths:
              - /health
            methods:
              - GET
            strip_path: true
