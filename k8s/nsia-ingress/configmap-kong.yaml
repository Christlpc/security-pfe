      # ===== SERVICE KEYCLOAK (Proxy IAM via Kong) =====
      - name: keycloak-service
        url: http://keycloak.nsia-iam.svc.cluster.local:8080
        routes:
          - name: keycloak-realms
            paths:
              - /realms
              - /admin
              - /resources
              - /js
            strip_path: false

      # ===== HEALTH CHECK ENDPOINT =====
      - name: health-service
        url: http://127.0.0.1:8001
        routes:
          - name: health
            paths:
              - /health
            methods:
              - GET
            strip_path: true
