# ============================================================
# PostgreSQL 15 — Base de données Backend Métier
# Stocke les données de souscription bancassurance
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-db
  namespace: nsia-backend
  labels:
    app: backend-db
    nsia.cg/component: business-database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: backend-db
        nsia.cg/component: business-database
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nsia_user"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "nsia_user"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: backend-db-data
