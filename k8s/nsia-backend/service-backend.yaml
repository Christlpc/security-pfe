# ============================================================
# Django Backend API — Service ClusterIP
# Accessible uniquement via Kong Gateway (Zero Trust)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: nsia-backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: backend
