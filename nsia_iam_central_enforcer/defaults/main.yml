---
# Plan de contrôle d'administration Keycloak
keycloak_admin_url: "http://localhost:8080"
keycloak_frontend_url: "{{ lookup('env', 'KEYCLOAK_FRONTEND_URL') | default('https://4.223.87.112:30843', true) }}"
# Configuration du coffre-fort HashiCorp Vault (nsia-keyvault)

nsia_vault_url: "{{ lookup('env', 'VAULT_ADDR') | default('http://localhost:8200', true) }}"
keycloak_admin_user: "{{ lookup('env', 'KEYCLOAK_ADMIN') | default('super_admin', true) }}"
keycloak_admin_password: "{{ lookup('env', 'KEYCLOAK_ADMIN_PASSWORD') | default('', true) }}"

# Mode d'exécution par défaut (all, single, interactive)
nsia_run_mode: "all"

# 📧 Configuration SMTP additionnelle (Optionnel)
# Keycloak ne renvoyant pas le mot de passe SMTP via son API REST (GET /realms/master),
# vous devez spécifier ici le mot de passe de connexion SMTP pour que les nouveaux realms puissent s'authentifier.
nsia_smtp_config:
  # password: "votre_mot_de_passe_smtp"


# Baseline de Sécurité NSIA endurcie (Conformité Loi n° 26-2019)
nsia_security_baseline:
  brute_force_protected: true
  max_login_failures: 3
  wait_increment_seconds: 60
  password_policy: "length(14) and digits(2) and upperCase(2) and specialChars(2) and passwordHistory(5)"
  
  # 🔐 Stratégie de rotation et cycle de vie des jetons (Atténuation Token Replay)
  access_token_lifespan: 300       # 5 minutes (TTL court obligatoire)
  sso_session_max_lifespan: 900    # 15 minutes avant ré-authentification
  sso_session_idle_lifespan: 600   # 10 minutes d'inactivité max

# Matrice RBAC réglementaire Bancassurance
nsia_rbac_roles:
  - BANK_SUPER_ADMIN
  - BANK_AUDITOR
  - BANK_SUPPORT
  - BANK_AGENCY_MANAGER
  - BANK_AGENCY_OPERATOR

